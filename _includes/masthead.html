<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="https://yqzhang-zz.github.io/zh/" target="_self">中文主页</a>
          </li>

          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}" target="_self">{{ link.title }}</a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // 1. 处理特定的“中文主页”大标题
    var homeLink = document.querySelector(".masthead__menu-home-item a");
    if (homeLink) {
      homeLink.onclick = function(e) {
        e.stopPropagation();
        window.location.href = this.getAttribute("href");
      };
    }

    // 2. 处理右侧 navigation.yml 生成的所有链接
    var navLinks = document.querySelectorAll(".masthead__menu-item a");
    navLinks.forEach(function(link) {
      // 检查链接是否包含 http (即是否为绝对路径外链)
      if (link.getAttribute("href").indexOf("http") === 0) {
        link.onclick = function(e) {
          // 彻底切断模板自带脚本的拦截
          e.stopPropagation();
          // 强制按照 HTML 里写的原始地址跳转
          window.location.href = this.getAttribute("href");
        };
      }
    });
  });
</script>
